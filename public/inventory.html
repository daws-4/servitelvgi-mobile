<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Servitel SGO</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3e78b2',    // Rich Cerulean
                        secondary: '#004ba8',  // Cobalt Blue
                        background: '#deefb7', // Tea Green
                        neutral: '#bcabae',    // Lilac Ash
                        dark: '#0f0f0f',       // Onyx
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .mobile-container {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background-color: white;
            border: 8px solid #1a1a1a;
            border-radius: 3.5rem;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .notch {
            height: 25px;
            width: 150px;
            background: #1a1a1a;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 1.2rem;
            border-bottom-right-radius: 1.2rem;
            z-index: 50;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-10 px-4 bg-slate-200">

    <div class="mobile-container flex flex-col bg-slate-50">
        <div class="notch"></div>
        
        <!-- Header Superior -->
        <header class="bg-secondary px-8 pt-12 pb-6 rounded-b-[3.5rem] shadow-xl relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            
            <div class="flex justify-between items-start relative z-10 mb-6">
                <div>
                    <h1 class="text-white text-2xl font-black tracking-tight">Mi Inventario</h1>
                    <p class="text-blue-100/70 text-[10px] font-bold uppercase tracking-widest mt-1">Stock Asignado • Daniel H.</p>
                </div>
                <button class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center text-white border border-white/20">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </button>
            </div>

            <!-- Resumen Rápido (Basado en Dashboard.html) -->
            <div class="grid grid-cols-2 gap-3 relative z-10">
                <div class="bg-background/20 backdrop-blur-sm p-4 rounded-3xl border border-white/10 flex items-center gap-3">
                    <div class="w-10 h-10 bg-background rounded-2xl flex items-center justify-center text-secondary shadow-lg">
                        <i class="fa-solid fa-box-open text-sm"></i>
                    </div>
                    <div>
                        <p class="text-[9px] font-black text-blue-100 uppercase opacity-60">Ítems</p>
                        <p class="text-sm font-black text-white">24 Tipos</p>
                    </div>
                </div>
                <div class="bg-white/10 backdrop-blur-sm p-4 rounded-3xl border border-white/10 flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-400 rounded-2xl flex items-center justify-center text-white shadow-lg">
                        <i class="fa-solid fa-triangle-exclamation text-sm"></i>
                    </div>
                    <div>
                        <p class="text-[9px] font-black text-blue-100 uppercase opacity-60">Alertas</p>
                        <p class="text-sm font-black text-white">03 Bajos</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Barra de Búsqueda y Filtros -->
        <div class="px-6 py-6 space-y-4">
            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 transition-colors group-focus-within:text-primary"></i>
                <input type="text" placeholder="Buscar material o código..." 
                       class="w-full bg-white border border-slate-200 rounded-2xl py-3.5 pl-11 pr-4 text-sm focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all shadow-sm">
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar">
                <button class="bg-primary text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap shadow-lg shadow-primary/20">Todos</button>
                <button class="bg-white text-slate-400 border border-slate-200 px-5 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap">Cables</button>
                <button class="bg-white text-slate-400 border border-slate-200 px-5 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap">Equipos</button>
                <button class="bg-white text-slate-400 border border-slate-200 px-5 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap">Conectores</button>
            </div>
        </div>

        <!-- Listado de Materiales (Scrollable) -->
        <div class="flex-grow px-6 space-y-3 overflow-y-auto no-scrollbar pb-32">
            
            <!-- Item 1: Stock Crítico -->
            <div class="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm flex items-center justify-between group active:scale-[0.98] transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center text-red-500">
                        <i class="fa-solid fa-tower-broadcast text-lg"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black text-dark uppercase tracking-tight">ONT HUAWEI EG8145V5</h3>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">CÓD: 00-042</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-lg font-black text-red-600 leading-none">02</p>
                    <p class="text-[8px] font-black text-red-400 uppercase mt-1">BAJO STOCK</p>
                </div>
            </div>

            <!-- Item 2: Stock Normal -->
            <div class="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm flex items-center justify-between group active:scale-[0.98] transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-background/30 rounded-2xl flex items-center justify-center text-primary">
                        <i class="fa-solid fa-lines-leaning text-lg"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black text-dark uppercase tracking-tight">CABLE UTP CAT5E</h3>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">CÓD: 00-001</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-lg font-black text-primary leading-none">145</p>
                    <p class="text-[8px] font-black text-slate-400 uppercase mt-1">METROS</p>
                </div>
            </div>

            <!-- Item 3 -->
            <div class="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm flex items-center justify-between group active:scale-[0.98] transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400">
                        <i class="fa-solid fa-plug text-lg"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black text-dark uppercase tracking-tight">CONECTORES MECÁNICOS</h3>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">CÓD: 00-012</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-lg font-black text-primary leading-none">50</p>
                    <p class="text-[8px] font-black text-slate-400 uppercase mt-1">UNIDADES</p>
                </div>
            </div>

            <!-- Item 4 -->
            <div class="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm flex items-center justify-between group active:scale-[0.98] transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400">
                        <i class="fa-solid fa-toolbox text-lg"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black text-dark uppercase tracking-tight">ROSETAS ÓPTICAS</h3>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">CÓD: 00-008</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-lg font-black text-primary leading-none">12</p>
                    <p class="text-[8px] font-black text-slate-400 uppercase mt-1">UNIDADES</p>
                </div>
            </div>

        </div>

        <!-- Botón de Acción Flotante (Solicitar Stock) -->
        <div class="absolute bottom-28 right-6">
            <button class="w-14 h-14 bg-primary text-white rounded-2xl shadow-2xl shadow-primary/40 flex items-center justify-center text-xl active:scale-90 transition-transform">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>

        <!-- Navbar Inferior Flotante (Consistente con toda la App) -->
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-dark/95 backdrop-blur-xl p-3 flex justify-around items-center rounded-[2.5rem] shadow-2xl">
            <button class="w-12 h-12 text-slate-500 flex items-center justify-center">
                <i class="fa-solid fa-house"></i>
            </button>
            <button class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center text-white shadow-lg shadow-primary/30">
                <i class="fa-solid fa-boxes-stacked"></i>
            </button>
            <button class="w-12 h-12 text-slate-500 flex items-center justify-center">
                <i class="fa-solid fa-user-gear"></i>
            </button>
        </div>
    </div>

</body>
</html>
