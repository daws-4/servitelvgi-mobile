<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Servitel SGO</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3e78b2',    // Rich Cerulean
                        secondary: '#004ba8',  // Cobalt Blue
                        background: '#deefb7', // Tea Green
                        neutral: '#bcabae',    // Lilac Ash
                        dark: '#0f0f0f',       // Onyx
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .mobile-container {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background-color: white;
            border: 8px solid #1a1a1a;
            border-radius: 3.5rem;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .notch {
            height: 25px;
            width: 150px;
            background: #1a1a1a;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 1.2rem;
            border-bottom-right-radius: 1.2rem;
            z-index: 50;
        }

        .profile-gradient {
            background: linear-gradient(135deg, #004ba8 0%, #3e78b2 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-10 px-4 bg-slate-200">

    <div class="mobile-container flex flex-col">
        <div class="notch"></div>
        
        <!-- Header / Perfil Superior -->
        <div class="profile-gradient pt-16 pb-12 px-8 rounded-b-[3.5rem] shadow-xl relative overflow-hidden">
            <!-- Decoración abstracta -->
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
            
            <div class="flex flex-col items-center text-center relative z-10">
                <div class="relative">
                    <div class="w-28 h-28 bg-white p-1 rounded-[2.5rem] shadow-2xl">
                        <img src="https://i.pravatar.cc/150?u=servitel_daniel" alt="Avatar" class="w-full h-full object-cover rounded-[2.3rem]">
                    </div>
                    <button class="absolute bottom-0 right-0 w-9 h-9 bg-background border-4 border-primary rounded-full flex items-center justify-center text-secondary shadow-lg">
                        <i class="fa-solid fa-camera text-xs"></i>
                    </button>
                </div>
                
                <h1 class="text-white text-2xl font-black mt-4 tracking-tight">Daniel Hernández</h1>
                <p class="text-blue-100/70 text-xs font-bold uppercase tracking-widest mt-1">Técnico Nivel 3 • Servitel</p>
                
                <!-- Badge de Estado -->
                <div class="mt-4 inline-flex items-center gap-2 bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20">
                    <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                    <span class="text-white text-[10px] font-black uppercase tracking-tighter">En Servicio</span>
                </div>
            </div>
        </div>

        <!-- Estadísticas Rápidas (Uso de Tea Green) -->
        <div class="flex justify-between gap-3 px-6 -mt-8 relative z-20">
            <div class="flex-1 bg-white p-4 rounded-3xl shadow-lg border border-slate-100 text-center">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Órdenes Hoy</p>
                <p class="text-xl font-black text-primary">08</p>
            </div>
            <div class="flex-1 bg-background p-4 rounded-3xl shadow-lg border border-background shadow-background/20 text-center">
                <p class="text-[9px] font-black text-secondary uppercase mb-1">Efectividad</p>
                <p class="text-xl font-black text-secondary">98%</p>
            </div>
            <div class="flex-1 bg-white p-4 rounded-3xl shadow-lg border border-slate-100 text-center">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Puntos</p>
                <p class="text-xl font-black text-primary">1.2k</p>
            </div>
        </div>

        <!-- Menú de Opciones -->
        <div class="flex-grow px-6 py-8 overflow-y-auto no-scrollbar space-y-2">
            
            <h4 class="text-[10px] font-black text-neutral uppercase tracking-[0.2em] mb-4 ml-2">Configuración Personal</h4>

            <!-- Opción: Información -->
            <button class="w-full flex items-center justify-between p-4 bg-slate-50 hover:bg-slate-100 rounded-2xl transition-all group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-primary shadow-sm border border-slate-100 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-user-pen"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-sm font-bold text-dark leading-none">Datos Personales</p>
                        <p class="text-[10px] text-slate-400 font-medium mt-1">Nombre, teléfono y correo</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <!-- Opción: Seguridad -->
            <button class="w-full flex items-center justify-between p-4 bg-slate-50 hover:bg-slate-100 rounded-2xl transition-all group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-primary shadow-sm border border-slate-100 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-sm font-bold text-dark leading-none">Seguridad</p>
                        <p class="text-[10px] text-slate-400 font-medium mt-1">Cambiar contraseña y PIN</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <h4 class="text-[10px] font-black text-neutral uppercase tracking-[0.2em] mb-4 mt-6 ml-2">Aplicación</h4>

            <!-- Opción: Notificaciones -->
            <button class="w-full flex items-center justify-between p-4 bg-slate-50 hover:bg-slate-100 rounded-2xl transition-all group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-primary shadow-sm border border-slate-100 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-bell"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-sm font-bold text-dark leading-none">Notificaciones</p>
                        <p class="text-[10px] text-slate-400 font-medium mt-1">Alertas de nuevas órdenes</p>
                    </div>
                </div>
                <div class="w-8 h-4 bg-background rounded-full relative">
                    <div class="absolute right-0.5 top-0.5 w-3 h-3 bg-secondary rounded-full"></div>
                </div>
            </button>

            <!-- Opción: Soporte -->
            <button class="w-full flex items-center justify-between p-4 bg-slate-50 hover:bg-slate-100 rounded-2xl transition-all group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-primary shadow-sm border border-slate-100 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-headset"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-sm font-bold text-dark leading-none">Soporte Técnico</p>
                        <p class="text-[10px] text-slate-400 font-medium mt-1">Ayuda con la aplicación</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <!-- Botón Cerrar Sesión -->
            <div class="pt-6">
                <button class="w-full py-4 bg-red-50 text-red-500 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 border border-red-100 active:scale-95 transition-all">
                    <i class="fa-solid fa-power-off"></i>
                    <span>Cerrar Sesión</span>
                </button>
            </div>
            
            <p class="text-center text-[9px] text-neutral font-bold pt-4 opacity-50">SGO VERSION 1.0.4-ST</p>
        </div>

        <!-- Navbar Inferior Flotante (Consistente) -->
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-dark/95 backdrop-blur-xl p-3 flex justify-around items-center rounded-[2.5rem] shadow-2xl">
            <button class="w-12 h-12 text-slate-500 flex items-center justify-center">
                <i class="fa-solid fa-house"></i>
            </button>
            <button class="w-12 h-12 text-slate-500 flex items-center justify-center">
                <i class="fa-solid fa-boxes-stacked"></i>
            </button>
            <button class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center text-white shadow-lg shadow-primary/30">
                <i class="fa-solid fa-user-gear"></i>
            </button>
        </div>
    </div>

</body>
</html>
