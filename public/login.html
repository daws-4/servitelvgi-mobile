<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Instaladores - Servitel</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3e78b2',    // Azul Servitel
                        secondary: '#004ba8',  // Azul Netuno
                        accent: '#ffd166',     // Amarillo resaltado
                        teaGreen: '#deefb7',   // Fondo suave
                        onyx: '#0f0f0f',       // Textos oscuros
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Suavizado de transiciones */
        .transition-all {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-4">

    <!-- Contenedor Principal (Mobile Width) -->
    <div class="w-full max-w-sm">
        
        <!-- Sección de Logo/Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-primary rounded-2xl shadow-xl shadow-primary/20 mb-4 rotate-3">
                <i class="fa-solid fa-screwdriver-wrench text-white text-4xl -rotate-3"></i>
            </div>
            <h1 class="text-3xl font-bold text-onyx tracking-tight">SERVITEL</h1>
            <p class="text-slate-500 font-medium">Gestión de Instaladores</p>
        </div>

        <!-- Tarjeta de Formulario -->
        <div class="bg-white p-8 rounded-3xl shadow-2xl shadow-slate-200 border border-slate-100">
            <h2 class="text-xl font-bold text-onyx mb-6 text-center">Acceso al Sistema</h2>
            
            <form id="loginForm" class="space-y-6" onsubmit="handleLogin(event)">
                
                <!-- Input de Usuario -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Usuario</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-300 group-focus-within:text-primary transition-all">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <input type="text" 
                               name="username"
                               placeholder="Ingresa tu usuario"
                               required
                               class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-onyx focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all">
                    </div>
                </div>

                <!-- Input de Contraseña -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Contraseña</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-300 group-focus-within:text-primary transition-all">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" 
                               id="password"
                               name="password"
                               placeholder="••••••••"
                               required
                               class="w-full pl-11 pr-12 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-onyx focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all">
                        
                        <!-- Botón para mostrar/ocultar password -->
                        <button type="button" 
                                onclick="togglePassword()"
                                class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-primary transition-all">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Botón de Acción -->
                <div class="pt-4">
                    <button type="submit" 
                            id="submitBtn"
                            class="w-full bg-primary hover:bg-secondary text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/30 active:scale-95 transition-all flex items-center justify-center gap-3">
                        <span>Iniciar Sesión</span>
                        <i class="fa-solid fa-arrow-right text-sm"></i>
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer / Soporte -->
        <div class="mt-12 text-center">
            <p class="text-slate-400 text-sm">¿Problemas con tu acceso?</p>
            <a href="https://wa.me/tu_numero" class="text-primary font-bold text-sm hover:underline flex items-center justify-center gap-2 mt-2">
                <i class="fa-brands fa-whatsapp"></i>
                Contactar a Soporte Técnico
            </a>
        </div>
    </div>

    <!-- Script de Funcionalidades -->
    <script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            
            // Efecto de carga
            btn.disabled = true;
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> <span>Verificando...</span>';
            
            // Simulación de respuesta de API
            setTimeout(() => {
                alert('Conexión establecida. Iniciando sesión...');
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }, 1500);
        }
    </script>
</body>
</html>
